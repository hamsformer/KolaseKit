<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KolaseKit — Foto Kolase Editor By @Hamziyadd</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #16161a;
    --surface2: #1e1e24;
    --surface3: #26262e;
    --border: #2e2e38;
    --accent: #f5c842;
    --accent2: #ff6b4a;
    --accent3: #7c6bff;
    --text: #f0eff5;
    --text2: #9898a8;
    --text3: #5a5a6e;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-primary {
    background: var(--accent);
    color: #111;
    font-weight: 600;
  }
  .btn-primary:hover { background: #f0bb20; transform: translateY(-1px); }
  .btn-danger {
    background: var(--accent2);
    color: #fff;
  }
  .btn-danger:hover { background: #e5603f; }
  .btn-purple {
    background: var(--accent3);
    color: #fff;
  }
  .btn-purple:hover { background: #6a5aee; }

  /* MAIN LAYOUT */
  .app-layout {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    height: calc(100vh - 61px);
  }

  /* LEFT PANEL */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* LAYOUT GRID */
  .layout-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .layout-thumb {
    aspect-ratio: 1;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .layout-thumb:hover { border-color: var(--accent); }
  .layout-thumb.active { border-color: var(--accent); background: rgba(245,200,66,0.08); }

  .layout-thumb svg {
    width: 100%;
    height: 100%;
  }

  .layout-label {
    font-size: 9px;
    color: var(--text3);
    text-align: center;
    margin-top: 4px;
    font-weight: 500;
  }

  .layout-item { display: flex; flex-direction: column; }

  /* CANVAS RATIO */
  .ratio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .ratio-btn {
    padding: 8px 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: 'Syne', sans-serif;
  }
  .ratio-btn:hover { border-color: var(--accent); color: var(--text); }
  .ratio-btn.active { border-color: var(--accent); background: rgba(245,200,66,0.1); color: var(--accent); }

  /* GAP CONTROL */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slider-row label { font-size: 12px; color: var(--text2); min-width: 40px; }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    height: 4px;
  }
  .slider-val {
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
    font-weight: 600;
  }

  /* BG COLOR */
  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }
  .color-swatch.active { border-color: var(--accent); transform: scale(1.15); }
  .color-swatch.custom {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    position: relative;
  }

  /* MIDDLE CANVAS */
  .canvas-area {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    padding: 32px;
    position: relative;
  }

  .canvas-wrapper {
    position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    transition: all 0.3s;
  }

  #collageCanvas {
    display: block;
    background: #000;
  }

  /* RIGHT PANEL */
  .panel-right {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* TEXT PANEL */
  .text-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--surface3);
    border-radius: 22px;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: var(--text2);
    border-radius: 50%;
    transition: 0.3s;
  }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider::before { transform: translateX(18px); background: #111; }

  .text-controls { display: none; }
  .text-controls.visible { display: block; }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }

  select.form-input { cursor: pointer; }

  textarea.form-input {
    resize: vertical;
    min-height: 72px;
  }

  .font-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .font-option {
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    color: var(--text);
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .font-option:hover { border-color: var(--accent3); }
  .font-option.active { border-color: var(--accent3); background: rgba(124,107,255,0.12); color: var(--accent3); }

  .color-picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .color-picker-row input[type=color] {
    width: 40px;
    height: 36px;
    padding: 2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }

  /* TEXT LAYER LIST */
  .text-layers {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .text-layer-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .text-layer-item:hover { border-color: var(--accent3); }
  .text-layer-item.selected { border-color: var(--accent3); background: rgba(124,107,255,0.1); }
  .text-layer-name { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .text-layer-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .text-layer-del:hover { color: var(--accent2); }

  /* STICKER PANEL */
  .sticker-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .sticker-btn {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .sticker-btn:hover { border-color: var(--accent); transform: scale(1.1); }

  /* PHOTO CELL DROP */
  .uploading-hint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    pointer-events: none;
  }
  .uploading-hint svg { opacity: 0.4; }
  .uploading-hint span { font-size: 12px; }

  /* ZOOM CONTROLS */
  .zoom-controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .zoom-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { background: var(--surface3); }
  .zoom-label { font-size: 12px; color: var(--text2); min-width: 40px; text-align: center; }

  /* DRAG OVERLAY */
  .drag-overlay {
    position: absolute;
    inset: 0;
    background: rgba(245,200,66,0.15);
    border: 3px dashed var(--accent);
    border-radius: var(--radius);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    pointer-events: none;
    z-index: 10;
  }
  .drag-overlay.visible { display: flex; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }

  /* TOOLTIP */
  [data-tip] { position: relative; }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface3);
    color: var(--text);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
  }
  [data-tip]:hover::after { opacity: 1; }

  /* TEXT SIZE SLIDER */
  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .range-row input[type=range] {
    flex: 1;
    accent-color: var(--accent3);
  }
  .range-val { font-size: 12px; color: var(--accent3); min-width: 30px; font-weight: 600; }

  /* ALIGN BUTTONS */
  .align-btns { display: flex; gap: 6px; }
  .align-btn {
    flex: 1;
    padding: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .align-btn:hover { border-color: var(--accent3); color: var(--text); }
  .align-btn.active { border-color: var(--accent3); background: rgba(124,107,255,0.12); color: var(--accent3); }

  /* Scrollable font list */
  .font-scroll {
    max-height: 180px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .font-row {
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .font-row:hover { border-color: var(--accent3); }
  .font-row.active { border-color: var(--accent3); background: rgba(124,107,255,0.1); }
  .font-preview { font-size: 15px; flex: 1; color: var(--text); }
  .font-name { font-size: 10px; color: var(--text3); }

  /* Section tab pills */
  .tab-pills {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .tab-pill {
    flex: 1;
    padding: 6px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-pill.active { background: var(--accent3); border-color: var(--accent3); color: #fff; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Kolase<span>Kit</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="clearAll()">🗑 Bersihkan</button>
    <button class="btn btn-ghost" onclick="downloadPNG()">⬇ PNG</button>
    <button class="btn btn-primary" onclick="downloadJPG()">💾 Simpan JPG</button>
  </div>
</header>

<div class="app-layout">

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <!-- Layout Templates -->
    <div class="panel-section">
      <div class="panel-section-title">Template Layout</div>
      <div class="tab-pills">
        <div class="tab-pill active" onclick="switchLayoutTab('grid', this)">Grid</div>
        <div class="tab-pill" onclick="switchLayoutTab('free', this)">Kreatif</div>
        <div class="tab-pill" onclick="switchLayoutTab('special', this)">Spesial</div>
      </div>

      <div id="tab-grid" class="tab-content active">
        <div class="layout-grid" id="layoutGrid"></div>
      </div>
      <div id="tab-free" class="tab-content">
        <div class="layout-grid" id="layoutFree"></div>
      </div>
      <div id="tab-special" class="tab-content">
        <div class="layout-grid" id="layoutSpecial"></div>
      </div>
    </div>

    <!-- Canvas Ratio -->
    <div class="panel-section">
      <div class="panel-section-title">Rasio Kanvas</div>
      <div class="ratio-grid">
        <div class="ratio-btn active" onclick="setRatio(1,1,this)">1:1</div>
        <div class="ratio-btn" onclick="setRatio(4,3,this)">4:3</div>
        <div class="ratio-btn" onclick="setRatio(3,4,this)">3:4</div>
        <div class="ratio-btn" onclick="setRatio(16,9,this)">16:9</div>
        <div class="ratio-btn" onclick="setRatio(9,16,this)">9:16</div>
        <div class="ratio-btn" onclick="setRatio(2,1,this)">2:1</div>
      </div>
    </div>

    <!-- Gap & Border -->
    <div class="panel-section">
      <div class="panel-section-title">Jarak & Border</div>
      <div class="slider-row" style="margin-bottom:10px">
        <label>Jarak</label>
        <input type="range" id="gapSlider" min="0" max="40" value="6" oninput="updateGap(this.value)">
        <span class="slider-val" id="gapVal">6px</span>
      </div>
      <div class="slider-row">
        <label>Radius</label>
        <input type="range" id="radiusSlider" min="0" max="60" value="0" oninput="updateRadius(this.value)">
        <span class="slider-val" id="radiusVal">0px</span>
      </div>
    </div>

    <!-- Background Color -->
    <div class="panel-section">
      <div class="panel-section-title">Warna Latar</div>
      <div class="color-row" id="bgColors">
        <div class="color-swatch active" style="background:#ffffff" onclick="setBg('#ffffff',this)" title="Putih"></div>
        <div class="color-swatch" style="background:#000000" onclick="setBg('#000000',this)" title="Hitam"></div>
        <div class="color-swatch" style="background:#f5c842" onclick="setBg('#f5c842',this)" title="Kuning"></div>
        <div class="color-swatch" style="background:#ff6b4a" onclick="setBg('#ff6b4a',this)" title="Oranye"></div>
        <div class="color-swatch" style="background:#7c6bff" onclick="setBg('#7c6bff',this)" title="Ungu"></div>
        <div class="color-swatch" style="background:#1a1a2e" onclick="setBg('#1a1a2e',this)" title="Navy"></div>
        <div class="color-swatch" style="background:#2d6a4f" onclick="setBg('#2d6a4f',this)" title="Hijau"></div>
        <div class="color-swatch" style="background:#f8edeb" onclick="setBg('#f8edeb',this)" title="Pink Pucat"></div>
      </div>
      <div style="margin-top:10px">
        <label class="form-label">Warna Custom</label>
        <input type="color" class="form-input" id="bgColorCustom" value="#ffffff" oninput="setBg(this.value, null)">
      </div>
    </div>

    <!-- Stickers -->
    <div class="panel-section">
      <div class="panel-section-title">Stiker Emoji</div>
      <div class="sticker-grid" id="stickerGrid"></div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvasArea">
    <div class="drag-overlay" id="dragOverlay">📁 Lepaskan foto di sini</div>
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="collageCanvas" width="600" height="600"></canvas>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomFit()" style="width:auto;padding:0 8px;font-size:11px;border-radius:6px;font-family:'DM Sans',sans-serif">Fit</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <!-- Text -->
    <div class="panel-section">
      <div class="text-toggle">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px">✏️ Tambah Teks</div>
        <label class="toggle-switch">
          <input type="checkbox" id="textToggle" onchange="toggleTextPanel()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="text-controls" id="textControls">
        <div class="form-group">
          <label class="form-label">Isi Teks</label>
          <textarea class="form-input" id="textContent" placeholder="Ketik teks di sini...">Momen Indah</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Font</label>
          <div class="font-scroll" id="fontList"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Ukuran</label>
          <div class="range-row">
            <input type="range" id="fontSize" min="12" max="120" value="36" oninput="document.getElementById('fontSizeVal').textContent=this.value+'px'">
            <span class="range-val" id="fontSizeVal">36px</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Warna Teks</label>
          <div class="color-picker-row">
            <input type="color" id="textColor" value="#ffffff">
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <div class="color-swatch" style="background:#fff;width:24px;height:24px;border:1px solid #333" onclick="document.getElementById('textColor').value='#ffffff'"></div>
              <div class="color-swatch" style="background:#000;width:24px;height:24px" onclick="document.getElementById('textColor').value='#000000'"></div>
              <div class="color-swatch" style="background:#f5c842;width:24px;height:24px" onclick="document.getElementById('textColor').value='#f5c842'"></div>
              <div class="color-swatch" style="background:#ff6b4a;width:24px;height:24px" onclick="document.getElementById('textColor').value='#ff6b4a'"></div>
              <div class="color-swatch" style="background:#7c6bff;width:24px;height:24px" onclick="document.getElementById('textColor').value='#7c6bff'"></div>

            <option value="soft">Bayangan Lembut</option>

          <label class="form-label">Posisi Teks</label>

          <label class="form-label">Rata Teks</label>
          <div class="align-btns">
            <button class="align-btn active" id="align-left" onclick="setTextAlign('left',this)">☰</button>
            <button class="align-btn" id="align-center" onclick="setTextAlign('center',this)">≡</button>

    <!-- Photo Actions -->
    <div class="panel-section">

      <p style="font-size:11px;color:var(--text3);text-align:center">Atau drag & drop foto ke panel kolase</p>
    </div>

    <!-- Selected Cell Info -->
    <div class="panel-section" id="selectedCellPanel" style="display:none">
      <div class="panel-section-title">📌 Sel Terpilih</div>
      <p id="selectedCellInfo" style="font-size:12px;color:var(--text2);margin-bottom:10px"></p>
      <button class="btn btn-ghost" style="width:100%;margin-bottom:6px;justify-content:center" onclick="uploadToSelectedCell()">📁 Ganti Foto</button>
      <input type="file" id="cellFileInput" accept="image/*" style="display:none" onchange="handleCellUpload(this.files)">
      <div class="form-group" style="margin-bottom:8px">
        <label class="form-label">Zoom Foto</label>
        <div class="range-row">
          <input type="range" id="cellZoom" min="50" max="300" value="100" oninput="updateCellZoom(this.value)">
          <span class="range-val" id="cellZoomVal">100%</span>
        </div>
      </div>
      <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="clearSelectedCell()">🗑 Hapus Foto</button>
    </div>
  </div>
</div>

<script>
// =============================
// DATA & STATE
// =============================
const CANVAS_W = 600;
const CANVAS_H = 600;
let currentLayout = null;
let cells = [];         // { x, y, w, h, img, imgScale, imgOffX, imgOffY }
let textLayers = [];    // { text, font, size, color, posY, align, shadow, x, y }
let stickerLayers = []; // { emoji, x, y, size }
let bgColor = '#ffffff';
let gap = 6;
let cellRadius = 0;
let canvasScale = 1;
let selectedCell = -1;
let selectedTextLayer = -1;
let textPosition = 'top';
let textAlign = 'left';
let isDragging = false;
let dragStart = { x:0, y:0 };
let dragMode = null;  // 'pan' | 'text' | null
let loadedFonts = new Set();
let ratioW = 1, ratioH = 1;

const canvas = document.getElementById('collageCanvas');
const ctx = canvas.getContext('2d');

// =============================
// FONTS
// =============================
const FONTS = [
  { name: 'Syne', label: 'Syne', url: 'https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap' },
  { name: 'Playfair Display', label: 'Playfair', url: 'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap' },
  { name: 'DM Sans', label: 'DM Sans', url: null },
  { name: 'Pacifico', label: 'Pacifico', url: 'https://fonts.googleapis.com/css2?family=Pacifico&display=swap' },
  { name: 'Bebas Neue', label: 'Bebas Neue', url: 'https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap' },
  { name: 'Dancing Script', label: 'Dancing', url: 'https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap' },
  { name: 'Righteous', label: 'Righteous', url: 'https://fonts.googleapis.com/css2?family=Righteous&display=swap' },
  { name: 'Abril Fatface', label: 'Abril Fatface', url: 'https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap' },
  { name: 'Satisfy', label: 'Satisfy', url: 'https://fonts.googleapis.com/css2?family=Satisfy&display=swap' },
  { name: 'Lobster', label: 'Lobster', url: 'https://fonts.googleapis.com/css2?family=Lobster&display=swap' },
  { name: 'Oswald', label: 'Oswald', url: 'https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap' },
  { name: 'Cinzel', label: 'Cinzel', url: 'https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap' },
  { name: 'Permanent Marker', label: 'Marker', url: 'https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap' },
  { name: 'Kalam', label: 'Kalam', url: 'https://fonts.googleapis.com/css2?family=Kalam:wght@700&display=swap' },
  { name: 'Press Start 2P', label: 'Pixel', url: 'https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap' },
];
let selectedFont = FONTS[0].name;

function loadFont(font) {
  if (!font.url || loadedFonts.has(font.name)) return;
  const link = document.createElement('link');
  link.rel = 'stylesheet'; link.href = font.url;
  document.head.appendChild(link);
  loadedFonts.add(font.name);
}

function buildFontList() {
  const el = document.getElementById('fontList');
  FONTS.forEach((f, i) => {
    loadFont(f);
    const row = document.createElement('div');
    row.className = 'font-row' + (i===0?' active':'');
    row.innerHTML = `<span class="font-preview" style="font-family:'${f.name}'">${f.label}</span>`;
    row.onclick = () => {
      document.querySelectorAll('.font-row').forEach(r=>r.classList.remove('active'));
      row.classList.add('active');
      selectedFont = f.name;
    };
    el.appendChild(row);
  });
}

// =============================
// STICKERS
// =============================
const STICKERS = ['❤️','⭐','🌟','✨','🎉','🔥','🌈','🦋','🌺','🎵','💫','🏆','🎊','💎','🌙','☀️','🎈','💝','🌸','🎀'];
function buildStickers() {
  const el = document.getElementById('stickerGrid');
  STICKERS.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'sticker-btn';
    btn.textContent = s;
    btn.onclick = () => addSticker(s);
    el.appendChild(btn);
  });
}

function addSticker(emoji) {
  stickerLayers.push({ emoji, x: canvas.width/2, y: canvas.height/2, size: 48 });
  render();
}

// =============================
// LAYOUT TEMPLATES
// =============================
const LAYOUTS_GRID = [
  { id:'1x1', label:'1 Foto', cells: (w,h,g)=>[{x:g,y:g,w:w-2*g,h:h-2*g}] },
  { id:'2h', label:'2 Samping', cells: (w,h,g)=>[
    {x:g,y:g,w:(w-3*g)/2,h:h-2*g},
    {x:g+(w-3*g)/2+g,y:g,w:(w-3*g)/2,h:h-2*g}
  ]},
  { id:'2v', label:'2 Atas', cells: (w,h,g)=>[
    {x:g,y:g,w:w-2*g,h:(h-3*g)/2},
    {x:g,y:g+(h-3*g)/2+g,w:w-2*g,h:(h-3*g)/2}
  ]},
  { id:'3h', label:'3 Samping', cells: (w,h,g)=>[
    {x:g,y:g,w:(w-4*g)/3,h:h-2*g},
    {x:g+(w-4*g)/3+g,y:g,w:(w-4*g)/3,h:h-2*g},
    {x:g+2*((w-4*g)/3+g),y:g,w:(w-4*g)/3,h:h-2*g}
  ]},
  { id:'4grid', label:'4 Grid', cells: (w,h,g)=>{
    const cw=(w-3*g)/2, ch=(h-3*g)/2;
    return[
      {x:g,y:g,w:cw,h:ch},{x:g+cw+g,y:g,w:cw,h:ch},
      {x:g,y:g+ch+g,w:cw,h:ch},{x:g+cw+g,y:g+ch+g,w:cw,h:ch}
    ]
  }},
  { id:'1L2R', label:'1+2 Kanan', cells: (w,h,g)=>{
    const lw=(w-3*g)*0.55, rw=w-3*g-lw, ch=(h-3*g)/2;
    return[
      {x:g,y:g,w:lw,h:h-2*g},
      {x:g+lw+g,y:g,w:rw,h:ch},
      {x:g+lw+g,y:g+ch+g,w:rw,h:ch}
    ]
  }},
  { id:'2L1R', label:'2+1 Kanan', cells: (w,h,g)=>{
    const lw=(w-3*g)*0.45, rw=w-3*g-lw, ch=(h-3*g)/2;
    return[
      {x:g,y:g,w:lw,h:ch},
      {x:g,y:g+ch+g,w:lw,h:ch},
      {x:g+lw+g,y:g,w:rw,h:h-2*g}
    ]
  }},
  { id:'3v', label:'3 Bawah', cells: (w,h,g)=>{
    const th=(h-3*g)*0.55, bh=h-3*g-th, bw=(w-4*g)/3;
    return[
      {x:g,y:g,w:w-2*g,h:th},
      {x:g,y:g+th+g,w:bw,h:bh},
      {x:g+bw+g,y:g+th+g,w:bw,h:bh},
      {x:g+2*(bw+g),y:g+th+g,w:bw,h:bh}
    ]
  }},
  { id:'6grid', label:'6 Grid', cells: (w,h,g)=>{
    const cw=(w-4*g)/3, ch=(h-3*g)/2;
    const cells=[];
    for(let r=0;r<2;r++) for(let c=0;c<3;c++) cells.push({x:g+c*(cw+g),y:g+r*(ch+g),w:cw,h:ch});
    return cells;
  }},
];

const LAYOUTS_FREE = [
  { id:'triptych', label:'Tritipik', cells: (w,h,g)=>{
    const mw=(w-4*g)*0.4, sw=(w-4*g)*0.3;
    return[
      {x:g,y:g,w:mw,h:h-2*g},
      {x:g+mw+g,y:g,w:sw,h:(h-3*g)/2},
      {x:g+mw+g,y:g+(h-3*g)/2+g,w:sw,h:(h-3*g)/2},
      {x:g+mw+sw+2*g,y:g,w:w-g-(mw+sw+2*g)-g,h:h-2*g}
    ]
  }},
  { id:'feature', label:'Utama', cells: (w,h,g)=>{
    const tw=w-2*g, fh=(h-3*g)*0.6, sh=(h-3*g)*0.4, sw=(tw-g)/2;
    return[
      {x:g,y:g,w:tw,h:fh},
      {x:g,y:g+fh+g,w:sw,h:sh},
      {x:g+sw+g,y:g+fh+g,w:sw,h:sh}
    ]
  }},
  { id:'magazine', label:'Majalah', cells: (w,h,g)=>{
    const col1w=(w-3*g)*0.35, col2w=(w-3*g)*0.35, col3w=w-3*g-col1w-col2w;
    const hh=(h-3*g)/2;
    return[
      {x:g,y:g,w:col1w,h:h-2*g},
      {x:g+col1w+g,y:g,w:col2w,h:hh},
      {x:g+col1w+g,y:g+hh+g,w:col2w,h:hh},
      {x:g+col1w+col2w+2*g,y:g,w:col3w,h:h-2*g}
    ]
  }},
  { id:'panorama', label:'Panorama', cells: (w,h,g)=>{
    const pw=w-2*g, ph=(h-3*g)*0.45, bw=(pw-g)/2;
    return[
      {x:g,y:g,w:pw,h:ph},
      {x:g,y:g+ph+g,w:bw,h:h-g-ph-2*g},
      {x:g+bw+g,y:g+ph+g,w:bw,h:h-g-ph-2*g}
    ]
  }},
  { id:'mosaic5', label:'Mosaik 5', cells: (w,h,g)=>{
    const hw=(w-3*g)/2, hh=(h-3*g)/2;
    return[
      {x:g,y:g,w:hw,h:hh},
      {x:g+hw+g,y:g,w:hw,h:hh},
      {x:g,y:g+hh+g,w:hw*0.6,h:hh},
      {x:g+hw*0.6+g,y:g+hh+g,w:hw*0.4,h:hh},
      {x:g+hw+g,y:g+hh+g,w:hw,h:hh}
    ]
  }},
  { id:'asymm', label:'Asimetri', cells: (w,h,g)=>{
    const a=(w-3*g)*0.6, b=(w-3*g)*0.4;
    const t=(h-3*g)*0.4, bot=(h-3*g)*0.6;
    return[
      {x:g,y:g,w:a,h:t},
      {x:g+a+g,y:g,w:b,h:bot},
      {x:g,y:g+t+g,w:a*0.4,h:bot},
      {x:g+a*0.4+g,y:g+t+g,w:a-a*0.4-g,h:bot}
    ]
  }},
  { id:'cross', label:'Silang', cells: (w,h,g)=>{
    const s=(Math.min(w,h)-4*g)/3;
    const cx=(w-s)/2, cy=(h-s)/2;
    return[
      {x:cx,y:g,w:s,h:s},
      {x:g,y:cy,w:s,h:s},
      {x:cx,y:cy,w:s,h:s},
      {x:w-g-s,y:cy,w:s,h:s},
      {x:cx,y:h-g-s,w:s,h:s}
    ]
  }},
  { id:'frame', label:'Frame', cells: (w,h,g)=>{
    const border=Math.min(w,h)*0.18;
    const cells=[];
    cells.push({x:g,y:g,w:w-2*g,h:border-g});
    cells.push({x:g,y:h-border,w:w-2*g,h:border-g});
    cells.push({x:g,y:border,w:border-g,h:h-2*border});
    cells.push({x:w-border,y:border,w:border-g,h:h-2*border});
    cells.push({x:border,y:border,w:w-2*border,h:h-2*border});
    return cells;
  }},
  { id:'stairs', label:'Tangga', cells: (w,h,g)=>{
    const n=4, cw=(w-2*g-(n-1)*g)/n, ch=(h-2*g-(n-1)*g)/n;
    const cells=[];
    for(let i=0;i<n;i++) cells.push({x:g+i*(cw+g),y:g+i*(ch+g),w:cw,h:ch});
    return cells;
  }},
];

const LAYOUTS_SPECIAL = [
  { id:'heart', label:'Hati', cells: (w,h,g)=>{
    // approximate heart with cells
    const s=Math.min(w,h), cs=s*0.3;
    const cx=w/2-cs/2, cy=h/2-cs/2;
    return[
      {x:cx-cs*0.5,y:cy-cs*0.3,w:cs,h:cs},
      {x:cx+cs*0.5,y:cy-cs*0.3,w:cs,h:cs},
      {x:cx,y:cy+cs*0.1,w:cs,h:cs},
      {x:cx-cs*0.3,y:cy+cs*0.6,w:cs*0.6,h:cs*0.5},
    ]
  }},
  { id:'3circle', label:'3 Oval', cells: (w,h,g)=>{
    const r=(Math.min(w,h)-4*g)/3;
    return[
      {x:g,y:(h-r)/2,w:r,h:r,round:true},
      {x:g+r+g,y:(h-r)/2,w:r,h:r,round:true},
      {x:g+2*(r+g),y:(h-r)/2,w:r,h:r,round:true}
    ]
  }},
  { id:'diamond4', label:'Berlian 4', cells: (w,h,g)=>{
    const s=Math.min(w,h)*0.35;
    const cx=w/2, cy=h/2;
    return[
      {x:cx-s/2,y:g,w:s,h:s},
      {x:g,y:cy-s/2,w:s,h:s},
      {x:cx+s/2-g,y:cy-s/2,w:s,h:s},
      {x:cx-s/2,y:cy+s/2-g,w:s,h:s}
    ]
  }},
  { id:'film', label:'Film Strip', cells: (w,h,g)=>{
    const n=5, strip=60, cw=(w-2*g), ch=(h-2*strip-3*g), cs=(cw-(n-1)*g)/n;
    const cells=[];
    for(let i=0;i<n;i++) cells.push({x:g+i*(cs+g),y:strip+g,w:cs,h:ch});
    return cells;
  }},
  { id:'polaroid', label:'Polaroid', cells: (w,h,g)=>{
    const pw=(w-3*g)/2, ph=pw*1.2;
    const y1=h/2-ph-g/2, y2=h/2+g/2;
    return[
      {x:g,y:y1+(h/2-y1-ph)/2,w:pw,h:ph},
      {x:g+pw+g,y:y2-(ph-(h-y2-g))/2,w:pw,h:ph}
    ]
  }},
  { id:'widescreen', label:'Sinema', cells: (w,h,g)=>{
    const bh=h*0.12, cw=w-2*g;
    const ch=h-2*bh-4*g;
    return[
      {x:g,y:g,w:cw/3-g,h:ch/2-g},{x:g+cw/3,y:g,w:cw/3-g,h:ch/2-g},{x:g+2*cw/3,y:g,w:cw/3,h:ch/2-g},
      {x:g,y:h/2,w:cw,h:ch/2},
    ]
  }},
];

// =============================
// BUILD LAYOUT BUTTONS
// =============================
function makeSVGThumb(layoutFn, w=60, h=60) {
  const testCells = layoutFn(w, h, 3);
  let rects = '';
  testCells.forEach(c => {
    if (c.round) {
      rects += `<rect x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="${Math.min(c.w,c.h)/2}" fill="#7c6bff" stroke="#3a3a4e" stroke-width="1"/>`;
    } else {
      rects += `<rect x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="2" fill="#7c6bff" stroke="#3a3a4e" stroke-width="1"/>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><rect width="${w}" height="${h}" fill="#1e1e24"/>${rects}</svg>`;
}

function buildLayoutButtons(containerEl, layouts) {
  layouts.forEach((l, idx) => {
    const item = document.createElement('div');
    item.className = 'layout-item';
    const thumb = document.createElement('div');
    thumb.className = 'layout-thumb' + (idx===0 && containerEl.id==='layoutGrid' ? ' active' : '');
    thumb.innerHTML = makeSVGThumb(l.cells);
    thumb.dataset.id = l.id;
    thumb.onclick = () => {
      document.querySelectorAll('.layout-thumb').forEach(t=>t.classList.remove('active'));
      thumb.classList.add('active');
      applyLayout(l);
    };
    const lbl = document.createElement('div');
    lbl.className = 'layout-label';
    lbl.textContent = l.label;
    item.appendChild(thumb);
    item.appendChild(lbl);
    containerEl.appendChild(item);
  });
}

function switchLayoutTab(tab, el) {
  document.querySelectorAll('.tab-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

// =============================
// APPLY LAYOUT
// =============================
function applyLayout(layout) {
  currentLayout = layout;
  const newCells = layout.cells(canvas.width, canvas.height, gap);
  // preserve existing images
  const oldImages = cells.map(c=>({ img:c.img, scale:c.imgScale, ox:c.imgOffX, oy:c.imgOffY }));
  cells = newCells.map((c, i) => ({
    ...c,
    img: oldImages[i]?.img || null,
    imgScale: oldImages[i]?.scale || 1,
    imgOffX: oldImages[i]?.ox || 0,
    imgOffY: oldImages[i]?.oy || 0,
  }));
  selectedCell = -1;
  document.getElementById('selectedCellPanel').style.display = 'none';
  render();
}

// =============================
// CANVAS RATIO
// =============================
function setRatio(w, h, btn) {
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ratioW = w; ratioH = h;
  const base = 600;
  if (w >= h) {
    canvas.width = base;
    canvas.height = Math.round(base * h / w);
  } else {
    canvas.height = base;
    canvas.width = Math.round(base * w / h);
  }
  if (currentLayout) applyLayout(currentLayout);
  else render();
}

// =============================
// GAP & RADIUS
// =============================
function updateGap(val) {
  gap = parseInt(val);
  document.getElementById('gapVal').textContent = val+'px';
  if (currentLayout) applyLayout(currentLayout);
}

function updateRadius(val) {
  cellRadius = parseInt(val);
  document.getElementById('radiusVal').textContent = val+'px';
  render();
}

// =============================
// BACKGROUND COLOR
// =============================
function setBg(color, swatch) {
  bgColor = color;
  document.getElementById('bgColorCustom').value = color;
  if (swatch) {
    document.querySelectorAll('#bgColors .color-swatch').forEach(s=>s.classList.remove('active'));
    swatch.classList.add('active');
  }
  render();
}

// =============================
// RENDER
// =============================
function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  cells.forEach((cell, i) => {
    ctx.save();
    // Clip to cell
    roundRectPath(cell.x, cell.y, cell.w, cell.h, cell.round ? Math.min(cell.w,cell.h)/2 : cellRadius);
    ctx.clip();

    if (cell.img) {
      drawImageFit(cell.img, cell.x, cell.y, cell.w, cell.h, cell.imgScale, cell.imgOffX, cell.imgOffY);
    } else {
      // Empty cell placeholder
      ctx.fillStyle = '#1e1e24';
      ctx.fillRect(cell.x, cell.y, cell.w, cell.h);
      ctx.fillStyle = '#3a3a4e';
      const fontSize = Math.min(cell.w, cell.h) * 0.22;
      ctx.font = `${fontSize}px DM Sans`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+', cell.x + cell.w/2, cell.y + cell.h/2);
    }
    ctx.restore();

    // Border for selected
    if (i === selectedCell) {
      ctx.save();
      roundRectPath(cell.x, cell.y, cell.w, cell.h, cell.round ? Math.min(cell.w,cell.h)/2 : cellRadius);
      ctx.strokeStyle = '#f5c842';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }
  });

  // Text layers
  textLayers.forEach((tl, i) => {
    drawTextLayer(tl, i === selectedTextLayer);
  });

  // Sticker layers
  stickerLayers.forEach(sl => {
    ctx.font = `${sl.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sl.emoji, sl.x, sl.y);
  });
}

function roundRectPath(x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function drawImageFit(img, x, y, w, h, scale, offX, offY) {
  const imgAR = img.width / img.height;
  const cellAR = w / h;
  let dw, dh;
  if (imgAR > cellAR) {
    dh = h * scale;
    dw = dh * imgAR;
  } else {
    dw = w * scale;
    dh = dw / imgAR;
  }
  const dx = x + (w - dw)/2 + offX;
  const dy = y + (h - dh)/2 + offY;
  ctx.drawImage(img, dx, dy, dw, dh);
}

function drawTextLayer(tl, selected) {
  ctx.save();
  ctx.font = `bold ${tl.size}px '${tl.font}'`;
  ctx.fillStyle = tl.color;
  ctx.textAlign = tl.align;

  // Shadow
  switch(tl.shadow) {
    case 'soft': ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=8; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2; break;
    case 'hard': ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=0; ctx.shadowOffsetX=3; ctx.shadowOffsetY=3; break;
    case 'glow': ctx.shadowColor=tl.color; ctx.shadowBlur=20; break;
    case 'outline':
      ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeText(tl.text, tl.x, tl.y);
      break;
  }

  ctx.fillText(tl.text, tl.x, tl.y);

  if (selected) {
    const m = ctx.measureText(tl.text);
    const tw = m.width;
    const th = tl.size * 1.2;
    let ox = tl.x;
    if (tl.align === 'center') ox -= tw/2;
    else if (tl.align === 'right') ox -= tw;
    ctx.strokeStyle = '#7c6bff';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(ox - 4, tl.y - th + 4, tw + 8, th + 4);
    ctx.setLineDash([]);
  }
  ctx.restore();
}

// =============================
// FILE UPLOAD
// =============================
function triggerUpload() { document.getElementById('fileInput').click(); }

function handleFileUpload(files) {
  Array.from(files).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // Find next empty cell
        const emptyIdx = cells.findIndex(c => !c.img);
        if (emptyIdx >= 0) {
          cells[emptyIdx].img = img;
          cells[emptyIdx].imgScale = 1;
          cells[emptyIdx].imgOffX = 0;
          cells[emptyIdx].imgOffY = 0;
          render();
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function uploadToSelectedCell() { document.getElementById('cellFileInput').click(); }

function handleCellUpload(files) {
  if (!files[0] || selectedCell < 0) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      cells[selectedCell].img = img;
      cells[selectedCell].imgScale = 1;
      cells[selectedCell].imgOffX = 0;
      cells[selectedCell].imgOffY = 0;
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(files[0]);
}

function clearSelectedCell() {
  if (selectedCell < 0) return;
  cells[selectedCell].img = null;
  render();
}

function updateCellZoom(val) {
  document.getElementById('cellZoomVal').textContent = val + '%';
  if (selectedCell < 0) return;
  cells[selectedCell].imgScale = val / 100;
  render();
}

// =============================
// CANVAS CLICK / DRAG
// =============================
canvas.addEventListener('mousedown', e => {
  const pos = getCanvasPos(e);
  isDragging = true;
  dragStart = pos;

  // Check text layers first
  selectedTextLayer = -1;
  for (let i = textLayers.length-1; i>=0; i--) {
    const tl = textLayers[i];
    ctx.font = `bold ${tl.size}px '${tl.font}'`;
    const m = ctx.measureText(tl.text);
    let ox = tl.x;
    if (tl.align === 'center') ox -= m.width/2;
    else if (tl.align === 'right') ox -= m.width;
    if (pos.x >= ox-6 && pos.x <= ox+m.width+6 && pos.y >= tl.y-tl.size*1.2 && pos.y <= tl.y+6) {
      selectedTextLayer = i;
      dragMode = 'text';
      render();
      return;
    }
  }

  // Check cells
  const hit = cells.findIndex(c => pos.x>=c.x && pos.x<=c.x+c.w && pos.y>=c.y && pos.y<=c.y+c.h);
  if (hit >= 0) {
    selectedCell = hit;
    dragMode = 'pan';
    const panel = document.getElementById('selectedCellPanel');
    panel.style.display = 'block';
    document.getElementById('selectedCellInfo').textContent = `Sel ${hit+1} dari ${cells.length}`;
    const z = Math.round(cells[hit].imgScale * 100);
    document.getElementById('cellZoom').value = z;
    document.getElementById('cellZoomVal').textContent = z + '%';
  } else {
    selectedCell = -1;
    document.getElementById('selectedCellPanel').style.display = 'none';
    dragMode = null;
  }
  render();
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - dragStart.x;
  const dy = pos.y - dragStart.y;

  if (dragMode === 'pan' && selectedCell >= 0 && cells[selectedCell].img) {
    cells[selectedCell].imgOffX += dx;
    cells[selectedCell].imgOffY += dy;
    render();
  } else if (dragMode === 'text' && selectedTextLayer >= 0) {
    textLayers[selectedTextLayer].x += dx;
    textLayers[selectedTextLayer].y += dy;
    render();
  }
  dragStart = pos;
});

canvas.addEventListener('mouseup', () => { isDragging = false; dragMode = null; });
canvas.addEventListener('mouseleave', () => { isDragging = false; dragMode = null; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (selectedCell >= 0 && cells[selectedCell].img) {
    cells[selectedCell].imgScale = Math.max(0.3, Math.min(5, cells[selectedCell].imgScale - e.deltaY * 0.001));
    render();
  }
}, { passive: false });

// Double click to upload
canvas.addEventListener('dblclick', e => {
  const pos = getCanvasPos(e);
  const hit = cells.findIndex(c => pos.x>=c.x && pos.x<=c.x+c.w && pos.y>=c.y && pos.y<=c.y+c.h);
  if (hit >= 0) {
    selectedCell = hit;
    document.getElementById('cellFileInput').click();
  }
});

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

// =============================
// DRAG & DROP FILES
// =============================
const canvasArea = document.getElementById('canvasArea');
canvasArea.addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('dragOverlay').classList.add('visible');
});
canvasArea.addEventListener('dragleave', () => {
  document.getElementById('dragOverlay').classList.remove('visible');
});
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('dragOverlay').classList.remove('visible');
  handleFileUpload(e.dataTransfer.files);
});

// =============================
// TEXT PANEL
// =============================
function toggleTextPanel() {
  const on = document.getElementById('textToggle').checked;
  document.getElementById('textControls').classList.toggle('visible', on);
}

function setTextPos(pos, btn) {
  textPosition = pos;
  document.querySelectorAll('[id^="pos-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setTextAlign(align, btn) {
  textAlign = align;
  document.querySelectorAll('[id^="align-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function addTextLayer() {
  const text = document.getElementById('textContent').value.trim();
  if (!text) return;

  let yPos;
  const padding = parseInt(document.getElementById('fontSize').value) + 20;
  if (textPosition === 'top') yPos = padding;
  else if (textPosition === 'center') yPos = canvas.height/2;
  else yPos = canvas.height - 20;

  let xPos;
  if (textAlign === 'left') xPos = 20;
  else if (textAlign === 'center') xPos = canvas.width/2;
  else xPos = canvas.width - 20;

  textLayers.push({
    text,
    font: selectedFont,
    size: parseInt(document.getElementById('fontSize').value),
    color: document.getElementById('textColor').value,
    shadow: document.getElementById('textShadow').value,
    align: textAlign,
    x: xPos,
    y: yPos,
  });

  updateTextLayersList();
  render();
}

function updateTextLayersList() {
  const el = document.getElementById('textLayers');
  el.innerHTML = '';
  textLayers.forEach((tl, i) => {
    const item = document.createElement('div');
    item.className = 'text-layer-item' + (i===selectedTextLayer?' selected':'');
    item.innerHTML = `<span class="text-layer-name">${tl.text}</span><button class="text-layer-del" onclick="deleteTextLayer(${i})">×</button>`;
    item.onclick = () => { selectedTextLayer = i; updateTextLayersList(); render(); };
    el.appendChild(item);
  });
}

function deleteTextLayer(i) {
  textLayers.splice(i, 1);
  if (selectedTextLayer >= textLayers.length) selectedTextLayer = -1;
  updateTextLayersList();
  render();
}

// =============================
// ZOOM CONTROLS
// =============================
function zoomIn() { canvasScale = Math.min(2, canvasScale + 0.1); applyCanvasScale(); }
function zoomOut() { canvasScale = Math.max(0.3, canvasScale - 0.1); applyCanvasScale(); }
function zoomFit() {
  const area = document.getElementById('canvasArea');
  const pw = area.clientWidth - 64, ph = area.clientHeight - 64;
  canvasScale = Math.min(pw/canvas.width, ph/canvas.height, 1);
  applyCanvasScale();
}
function applyCanvasScale() {
  const wrapper = document.getElementById('canvasWrapper');
  wrapper.style.transform = `scale(${canvasScale})`;
  document.getElementById('zoomLabel').textContent = Math.round(canvasScale*100)+'%';
}

// =============================
// DOWNLOAD
// =============================
function downloadPNG() {
  const link = document.createElement('a');
  link.download = 'kolasekit.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
function downloadJPG() {
  const link = document.createElement('a');
  link.download = 'kolasekit.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
}

function clearAll() {
  cells.forEach(c => { c.img=null; c.imgScale=1; c.imgOffX=0; c.imgOffY=0; });
  textLayers = [];
  stickerLayers = [];
  selectedCell = -1;
  selectedTextLayer = -1;
  document.getElementById('selectedCellPanel').style.display='none';
  updateTextLayersList();
  render();
}

// =============================
// INIT
// =============================
window.addEventListener('load', () => {
  buildFontList();
  buildStickers();
  buildLayoutButtons(document.getElementById('layoutGrid'), LAYOUTS_GRID);
  buildLayoutButtons(document.getElementById('layoutFree'), LAYOUTS_FREE);
  buildLayoutButtons(document.getElementById('layoutSpecial'), LAYOUTS_SPECIAL);

  // Load all Google Fonts
  FONTS.forEach(f => loadFont(f));

  // Apply default layout
  applyLayout(LAYOUTS_GRID[0]);
  zoomFit();
  setTimeout(zoomFit, 200);
});

window.addEventListener('resize', () => { zoomFit(); });
</script>
